name: Deploy portfolio

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: portfolio-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test
      - name: Build
        run: npm run build
        env:
          CI: true
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: portfolio-${{ github.run_id }}
          role-duration-seconds: 900
          allowed-account-ids: ${{ vars.AWS_ACCOUNT_ID }}
          unset-current-credentials: true
      - name: Deploy immutable assets to S3
        run: >-
          aws s3 sync dist/assets "s3://${{ vars.AWS_S3_BUCKET }}/assets"
          --cache-control "public,max-age=31536000,immutable"
          --only-show-errors
      - name: Deploy mutable site files to S3
        run: >-
          aws s3 sync dist "s3://${{ vars.AWS_S3_BUCKET }}"
          --delete
          --exclude "assets/*"
          --cache-control "no-cache,max-age=0,must-revalidate"
          --only-show-errors
      - name: Invalidate CloudFront
        run: >-
          aws cloudfront create-invalidation
          --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION }}"
          --paths "/" "/index.html" "/robots.txt" "/sitemap.xml"
